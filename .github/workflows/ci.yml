name: "CI - Nix"
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  populate-cache:
    name: "${{ matrix.build }} on ${{ matrix.os }}"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        # os: TODO [macos-15, ubuntu-24.04]
        os: [ubuntu-24.04]
        build: ["pinocchio", "py-aligator", "gepetto-viewer", "devShells.x86_64-linux.hpp", "devShells.x86_64-linux.hpp-bin", "python"]
        # include:
        #   - os: macos-15-intel
        #     build: py-aligator
        #   - os: ubuntu-24.04-arm
        #     build: coal
        #   - os: ubuntu-24.04-arm
        #     build: proxsuite
        #   - os: ubuntu-24.04-arm
        #     build: py-casadi
        #   - os: ubuntu-24.04-arm
        #     build: aligator
        #   - os: ubuntu-24.04-arm
        #     build: py-aligator
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: gepetto
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: ros
      - run: nix build -L ".#${{ matrix.build }}" --cores 4
  complete:
    needs: populate-cache
    name: "${{ matrix.os }}"
    runs-on: "${{ matrix.os }}-latest"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu] # TODO: macos
    steps:
      - uses: jlumbroso/free-disk-space@main
        if: ${{ matrix.os == 'ubuntu' }}
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: gepetto
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: ros
      - run: nix flake check -L --cores 4
  system:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: gepetto
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: ros
      - run: nix build -L .#systemConfigs.default
  build-doc:
    if: github.repository == 'gepetto/nix' && github.ref == 'refs/heads/main'
    runs-on: "ubuntu-latest"
    needs: complete
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: gepetto
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: ros
      - run: nix build -L .#gepetto-doc
      - run: mkdir doc
      - run: cp -r result/* doc
      - uses: actions/upload-pages-artifact@v4
        with:
          path: doc/
  deploy-doc:
    if: github.repository == 'gepetto/nix' && github.ref == 'refs/heads/main'
    runs-on: "ubuntu-latest"
    needs: build-doc
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  check:
    if: always()
    name: check-macos-linux-nix
    runs-on: ubuntu-latest
    needs:
      - populate-cache
      - complete
      - system
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
